name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Step 1: Build the Docker image and tag it
    - name: Build the Docker image
      run: |
        IMAGE_TAG=$(date +%s)
        docker build . --file Dockerfile --tag my-image-name:$IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    # Step 2: Log in to Docker Hub
    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    # Step 3: Push the Docker image to Docker Hub
    - name: Push Docker image to Docker Hub
      run: |
        docker tag my-image-name:${{ env.IMAGE_TAG }} docker.io/${{ secrets.DOCKER_USERNAME }}/my-image-name:latest
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/my-image-name:latest
